<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>私房菜菜单</title>
    <style>
        :root {
            --primary: #e07c5a;
            --primary-light: #f5c6b3;
            --primary-bg: #fdf3ee;
            --accent: #f0a58c;
            --bg: #fefaf6;
            --card-bg: #ffffff;
            --text: #4a3728;
            --text-light: #9b7b6b;
            --text-muted: #c4a99a;
            --border: #f0e3da;
            --danger: #e07474;
            --success: #7bb89f;
            --shadow: 0 2px 12px rgba(180, 140, 120, 0.08);
            --shadow-hover: 0 4px 20px rgba(180, 140, 120, 0.15);
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--bg);
            height: 100vh; height: 100dvh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

        /* Header */
        .header {
            background: linear-gradient(160deg, #fde8df 0%, #fdf1ea 30%, #fef8f4 70%, #fde8df 100%);
            padding: 14px 16px 10px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -30px; right: -20px;
            width: 100px; height: 100px;
            background: radial-gradient(circle, rgba(240,165,140,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        .header-top {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 6px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        .avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fde8df, #fef8f4);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(200,150,120,0.12);
        }
        .title-area {
            flex: 1; min-width: 120px;
            cursor: pointer; user-select: none; -webkit-user-select: none;
        }
        .title-area h1 {
            font-size: 17px;
            color: var(--text);
            word-break: keep-all;
            pointer-events: none;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .title-area p {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 1px;
            transition: color 0.3s;
        }
        .title-area p.syncing { color: var(--primary); }
        .admin-badge {
            display: none;
            background: var(--primary);
            color: #fff;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
            font-weight: 500;
        }
        .admin-badge.show { display: inline-block; }
        .header-actions {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-sm {
            padding: 5px 12px;
            border-radius: 14px;
            border: 1.5px solid var(--primary-light);
            background: rgba(255,255,255,0.7);
            color: var(--primary);
            font-size: 12px;
            cursor: pointer;
            display: none;
            font-weight: 500;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .btn-sm:active { transform: scale(0.95); }
        .btn-sm.primary {
            background: var(--primary);
            color: #fff;
            border: none;
        }
        .btn-sm.show { display: inline-block; }
        .tabs {
            display: flex;
            gap: 24px;
            margin-top: 6px;
            position: relative;
            z-index: 1;
        }
        .tab {
            padding: 6px 0;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            font-weight: 500;
            transition: color 0.2s;
        }
        .tab.active { color: var(--text); font-weight: 700; }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 76px;
            background: var(--card-bg);
            overflow-y: auto;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            scrollbar-width: none;
        }
        .sidebar::-webkit-scrollbar { display: none; }
        .category {
            padding: 14px 6px;
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            font-weight: 500;
        }
        .category.active {
            background: var(--primary-bg);
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: 700;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            scroll-behavior: smooth;
        }
        .content::-webkit-scrollbar { width: 3px; }
        .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .dish-list { display: flex; flex-direction: column; gap: 10px; }
        .dish-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 10px 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s;
        }
        .dish-card:active { box-shadow: var(--shadow-hover); }
        .dish-img {
            width: 72px; height: 72px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: linear-gradient(135deg, #fdf3ee, #fef8f4);
            flex-shrink: 0;
            border: 1px solid var(--border);
        }
        .dish-img-placeholder {
            width: 72px; height: 72px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #fde8df, #fdf3ee);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            color: var(--accent);
        }
        .dish-info { flex: 1; min-width: 0; }
        .dish-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
        .dish-sales { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
        .dish-action {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .btn-add {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            box-shadow: 0 2px 6px rgba(224,124,90,0.25);
        }
        .btn-add:active { transform: scale(0.9); background: #d0694a; }
        .btn-minus {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text-light);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            transition: all 0.15s;
        }
        .btn-minus:active { background: var(--primary-bg); border-color: var(--primary-light); }
        .count {
            font-size: 14px;
            color: var(--text);
            min-width: 18px;
            text-align: center;
            font-weight: 600;
        }
        .admin-btn {
            display: none;
            width: 24px; height: 24px;
            border-radius: 50%;
            border: none;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .admin-btn:active { transform: scale(0.9); }
        .admin-btn.show { display: flex; align-items: center; justify-content: center; }
        .btn-edit { background: #eaf6ed; color: var(--success); }
        .btn-del { background: #fdf0f0; color: var(--danger); }

        /* Footer */
        .footer {
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 8px 14px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            flex-shrink: 0;
        }
        .cart-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cart-icon {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(224,124,90,0.3);
            transition: transform 0.15s;
        }
        .cart-icon:active { transform: scale(0.9); }
        .cart-badge {
            position: absolute;
            top: -4px; right: -4px;
            background: var(--danger);
            color: #fff;
            font-size: 10px;
            min-width: 18px; height: 18px;
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600;
            padding: 0 4px;
        }
        .cart-btns {
            flex: 1;
            display: flex;
            gap: 8px;
        }
        .btn {
            flex: 1;
            padding: 11px;
            border-radius: 24px;
            border: 1.5px solid var(--primary-light);
            background: var(--card-bg);
            color: var(--primary);
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: all 0.15s;
        }
        .btn:active { background: var(--primary-bg); }
        .btn.primary {
            background: var(--primary);
            color: #fff;
            border: none;
            box-shadow: 0 2px 8px rgba(224,124,90,0.25);
        }
        .btn.primary:active { background: #d0694a; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(74,55,40,0.35);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(2px);
        }
        .modal.show { display: flex; }
        .modal-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 22px;
            width: 100%;
            max-width: 340px;
            max-height: 78vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(74,55,40,0.15);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 14px;
        }
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.2s;
            outline: none;
            -webkit-appearance: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-actions .btn { padding: 10px; }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin: 8px 0 12px;
            max-height: 40vh;
        }
        .cart-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            gap: 8px;
        }
        .cart-item-name { flex: 1; font-size: 14px; color: var(--text); font-weight: 500; }
        .cart-item-count { color: var(--text-muted); font-size: 13px; min-width: 28px; text-align: center; }

        .empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .empty-icon { font-size: 48px; margin-bottom: 10px; opacity: 0.6; }

        .btn-upload {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1.5px dashed var(--accent);
            background: var(--primary-bg);
            color: var(--primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-upload:active { background: #fde8df; }
        .btn-upload input { display: none; }
        .image-preview {
            width: 72px; height: 72px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--primary-bg);
            margin: 8px 0;
            display: none;
            border: 1px solid var(--border);
        }
        .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: block; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: #fff;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 999;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(74,55,40,0.25);
            animation: toastIn 0.3s ease;
            font-weight: 500;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Loading */
        .loading-spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive tweaks */
        @media (min-width: 480px) {
            .dish-img, .dish-img-placeholder { width: 88px; height: 88px; }
            .sidebar { width: 88px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-top">
                <div class="avatar">🐰</div>
                <div class="title-area" onclick="onTitleClick()">
                    <h1>老大的私房菜单<span class="admin-badge" id="adminBadge">管理</span></h1>
                    <p id="syncStatus" onclick="manualRefresh()" style="cursor:pointer;" title="点击刷新数据">给糖小宝准备的菜单~</p>
                </div>
                <div class="header-actions">
                    <button class="btn-sm" id="btnManage" onclick="openManage()">分类</button>
                    <button class="btn-sm primary" id="btnAdd" onclick="openAdd()">添加菜品</button>
                    <button class="btn-sm" id="btnExit" onclick="exitAdmin()" style="border-color:var(--danger);color:var(--danger);">退出</button>
                </div>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('menu')">私房菜</div>
                <div class="tab" onclick="switchTab('today')">今日安排</div>
            </div>
        </div>

        <div class="main">
            <div class="sidebar" id="sidebar"></div>
            <div class="content" id="content"></div>
        </div>

        <div class="footer">
            <div class="cart-bar">
                <div class="cart-icon" onclick="openCart()">
                    🛒
                    <span class="cart-badge" id="cartBadge" style="display:none">0</span>
                </div>
                <div class="cart-btns">
                    <button class="btn" onclick="randomPick()">🎲 随机选</button>
                    <button class="btn primary" onclick="openCart()">选好了</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑菜品弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-box">
            <div class="modal-title" id="addModalTitle">添加菜品</div>
            <div class="form-group">
                <label>菜品名称</label>
                <input type="text" id="dishName" placeholder="例如：红烧排骨">
            </div>
            <div class="form-group">
                <label>分类</label>
                <select id="dishCategory"></select>
            </div>
            <div class="form-group">
                <label>图片</label>
                <label class="btn-upload">📷 选择图片<input type="file" id="dishImageFile" accept="image/*" onchange="previewImage(this)"></label>
                <img class="image-preview" id="imagePreview" src="">
                <input type="text" id="dishImage" placeholder="或填写图片URL" style="margin-top:8px;">
                <span class="form-hint">图片自动转为Base64存储</span>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('addModal')">取消</button>
                <button class="btn primary" onclick="saveDish()">保存</button>
            </div>
        </div>
    </div>

    <!-- 购物车弹窗 -->
    <div class="modal" id="cartModal">
        <div class="modal-box">
            <div class="modal-title">已选菜品</div>
            <div class="cart-items" id="cartItems"></div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('cartModal')">继续选</button>
                <button class="btn primary" id="btnConfirmOrder" onclick="confirmOrder()">确定下单</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const API_BASE = localStorage.getItem('api_base') || 'https://sifangcai-api.1247540213.workers.dev';
        const STORAGE_ADMIN = 'admin_token';
        const STORAGE_CART = 'cart';
        let adminToken = localStorage.getItem(STORAGE_ADMIN) || '';

        // ========== 状态 ==========
        let categories = [];
        let dishes = [];
        let todayList = [];
        let cart = {};
        let currentCategoryId = null;
        let currentTab = 'menu';
        let isAdmin = false;
        let editingDishId = null;
        let titleClickCount = 0;
        let titleClickTimer = null;

        // ========== API 封装 ==========
        async function api(path, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (adminToken) headers['Authorization'] = `Bearer ${adminToken}`;
            const resp = await fetch(API_BASE + path, { headers, ...options });
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error || '请求失败');
            return data;
        }

        async function apiGet(path) {
            return api(path);
        }

        async function apiPost(path, body) {
            return api(path, { method: 'POST', body: JSON.stringify(body) });
        }

        async function apiPut(path, body) {
            return api(path, { method: 'PUT', body: JSON.stringify(body) });
        }

        async function apiDelete(path) {
            return api(path, { method: 'DELETE' });
        }

        // ========== 管理员入口 ==========
        function onTitleClick() {
            titleClickCount++;
            if (titleClickCount >= 5) {
                titleClickCount = 0;
                if (!isAdmin) enterAdmin();
                else exitAdmin();
            }
            clearTimeout(titleClickTimer);
            titleClickTimer = setTimeout(() => { titleClickCount = 0; }, 2000);
        }

        async function enterAdmin() {
            if (adminToken) {
                // 已有 token，直接尝试进入
                isAdmin = true;
                showAdminUI();
                renderContent();
                return;
            }
            const pw = prompt('请输入管理密码：');
            if (!pw) return;
            try {
                const data = await apiPost('/api/auth', { password: pw });
                adminToken = data.token;
                localStorage.setItem(STORAGE_ADMIN, adminToken);
                isAdmin = true;
                showAdminUI();
                renderContent();
                showToast('已进入管理模式');
            } catch (e) {
                showToast('密码错误');
            }
        }

        function showAdminUI() {
            document.getElementById('adminBadge').classList.add('show');
            document.getElementById('btnManage').classList.add('show');
            document.getElementById('btnAdd').classList.add('show');
            document.getElementById('btnExit').classList.add('show');
        }

        function exitAdmin() {
            isAdmin = false;
            adminToken = '';
            localStorage.removeItem(STORAGE_ADMIN);
            document.getElementById('adminBadge').classList.remove('show');
            document.getElementById('btnManage').classList.remove('show');
            document.getElementById('btnAdd').classList.remove('show');
            document.getElementById('btnExit').classList.remove('show');
            showToast('已退出管理模式');
            renderContent();
        }

        // ========== 数据加载 ==========
        async function loadAll() {
            try {
                // 并行加载分类、菜品、今日安排
                const [cats, allDishes, today] = await Promise.all([
                    apiGet('/api/categories'),
                    apiGet('/api/dishes'),
                    apiGet('/api/today').catch(() => []),
                ]);
                categories = cats;
                dishes = allDishes;
                todayList = today;
                if (categories.length > 0 && !currentCategoryId) {
                    currentCategoryId = categories[0].id;
                }
                updateSyncStatus();
            } catch (e) {
                console.error('加载失败:', e);
                updateSyncStatus('连接失败，下拉刷新重试');
            }

            // 恢复购物车
            try {
                cart = JSON.parse(localStorage.getItem(STORAGE_CART) || '{}');
                // 清理无效菜品
                const dishIds = new Set(dishes.map(d => d.id));
                Object.keys(cart).forEach(id => {
                    if (!dishIds.has(parseInt(id))) delete cart[id];
                });
                saveCart();
            } catch (e) { cart = {}; }
        }

        async function manualRefresh() {
            showToast('刷新中...');
            await loadAll();
            renderSidebar();
            renderContent();
            updateCartBadge();
            showToast('已刷新');
        }

        function updateSyncStatus(msg) {
            const el = document.getElementById('syncStatus');
            if (!el) return;
            if (msg) {
                el.textContent = msg;
                el.classList.remove('syncing');
            } else {
                el.textContent = '给糖小宝准备的菜单~';
                el.classList.remove('syncing');
            }
        }

        // ========== 渲染 ==========
        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = categories.map(c =>
                `<div class="category ${c.id === currentCategoryId ? 'active' : ''}" onclick="selectCategory(${c.id})">${c.name}</div>`
            ).join('');
        }

        function renderContent() {
            const content = document.getElementById('content');
            if (currentTab === 'today') return renderToday(content);

            const filtered = dishes.filter(d => d.category_id === currentCategoryId);
            if (filtered.length === 0) {
                content.innerHTML = '<div class="empty"><div class="empty-icon">🍳</div>该分类暂无菜品~</div>';
                return;
            }
            content.innerHTML = `<div class="dish-list">${filtered.map(d => {
                const imgHtml = d.image
                    ? `<img class="dish-img" src="${escHtml(d.image)}" alt="${escHtml(d.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
                    : '';
                const placeholderHtml = `<div class="dish-img-placeholder" style="${d.image ? 'display:none' : ''}">🍽️</div>`;
                return `
                <div class="dish-card">
                    ${imgHtml}${placeholderHtml}
                    <div class="dish-info">
                        <div class="dish-name">${escHtml(d.name)}</div>
                        <div class="dish-sales">已点 ${d.sales || 0} 次</div>
                    </div>
                    <div class="dish-action">
                        ${isAdmin ? `
                            <button class="admin-btn btn-edit show" onclick="openEdit(${d.id})" title="编辑">✎</button>
                            <button class="admin-btn btn-del show" onclick="deleteDish(${d.id})" title="删除">✕</button>
                        ` : ''}
                        ${cart[d.id] ? `<button class="btn-minus" onclick="updateCart(${d.id},-1)">−</button><span class="count">${cart[d.id]}</span>` : ''}
                        <button class="btn-add" onclick="updateCart(${d.id},1)">+</button>
                    </div>
                </div>`;
            }).join('')}</div>`;
        }

        function renderToday(content) {
            if (todayList.length === 0) {
                content.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>今天还没点菜哦~</div>';
                return;
            }
            content.innerHTML = `<div class="dish-list">${todayList.map(t => {
                const imgHtml = t.image
                    ? `<img class="dish-img" src="${escHtml(t.image)}" alt="${escHtml(t.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
                    : '';
                const placeholderHtml = `<div class="dish-img-placeholder" style="${t.image ? 'display:none' : ''}">🍽️</div>`;
                return `<div class="dish-card">
                    ${imgHtml}${placeholderHtml}
                    <div class="dish-info">
                        <div class="dish-name">${escHtml(t.name)}</div>
                        <div class="dish-sales">${escHtml(t.category || '')} · 已点${t.sales || 0}次</div>
                    </div>
                    <button class="admin-btn btn-del show" onclick="removeToday(${t.dish_id})" style="width:28px;height:28px;">✕</button>
                </div>`;
            }).join('')}</div>`;
        }

        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        function selectCategory(catId) {
            currentCategoryId = catId;
            renderSidebar();
            renderContent();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((el, i) => {
                el.classList.toggle('active', (tab === 'menu' && i === 0) || (tab === 'today' && i === 1));
            });
            renderContent();
        }

        // ========== 菜品增删改 ==========
        function openAdd() {
            if (!isAdmin) return;
            editingDishId = null;
            document.getElementById('addModalTitle').textContent = '添加菜品';
            document.getElementById('dishName').value = '';
            document.getElementById('dishImage').value = '';
            document.getElementById('dishImageFile').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            initCategorySelect();
            openModal('addModal');
        }

        function openEdit(id) {
            if (!isAdmin) return;
            const d = dishes.find(x => x.id === id);
            if (!d) return;
            editingDishId = id;
            document.getElementById('addModalTitle').textContent = '编辑菜品';
            document.getElementById('dishName').value = d.name;
            document.getElementById('dishImage').value = d.image || '';
            document.getElementById('dishImageFile').value = '';
            const preview = document.getElementById('imagePreview');
            if (d.image) {
                preview.src = d.image;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
            initCategorySelect();
            document.getElementById('dishCategory').value = d.category_id;
            openModal('addModal');
        }

        async function deleteDish(id) {
            if (!isAdmin) return;
            const d = dishes.find(x => x.id === id);
            showConfirm(`确定删除"${d ? d.name : '菜品'}"？`, async () => {
                try {
                    await apiDelete(`/api/dishes/${id}`);
                    await loadAll();
                    showToast('删除成功');
                    renderSidebar();
                    renderContent();
                } catch (e) {
                    showToast('删除失败: ' + e.message);
                }
            });
        }

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveDish() {
            if (!isAdmin) return;
            const nameEl = document.getElementById('dishName');
            const catEl = document.getElementById('dishCategory');
            const imgEl = document.getElementById('dishImage');
            const fileInput = document.getElementById('dishImageFile');

            if (!nameEl || !catEl) { showToast('表单加载异常'); return; }

            const name = nameEl.value.trim();
            const category_id = parseInt(catEl.value);
            const imageUrl = imgEl ? imgEl.value.trim() : '';

            if (!name) { showToast('请输入菜品名称'); return; }
            if (!category_id) { showToast('请选择分类'); return; }

            async function doSave(finalImage) {
                try {
                    if (editingDishId) {
                        const body = { name, category_id };
                        if (finalImage) body.image = finalImage;
                        await apiPut(`/api/dishes/${editingDishId}`, body);
                    } else {
                        await apiPost('/api/dishes', { name, category_id, image: finalImage || '' });
                    }
                    closeModal('addModal');
                    editingDishId = null;
                    await loadAll();
                    currentCategoryId = category_id;
                    renderSidebar();
                    renderContent();
                    showToast('保存成功');
                } catch (e) {
                    showToast('保存失败: ' + e.message);
                }
            }

            if (fileInput && fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = e => doSave(e.target.result);
                reader.onerror = () => doSave(imageUrl);
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                doSave(imageUrl);
            }
        }

        function initCategorySelect() {
            const select = document.getElementById('dishCategory');
            select.innerHTML = categories.map(c =>
                `<option value="${c.id}">${c.name}</option>`
            ).join('');
        }

        // ========== 分类管理 ==========
        function openManage() {
            if (!isAdmin) return;
            const old = document.getElementById('manageModal');
            if (old) old.remove();

            const html = `
            <div class="modal show" id="manageModal" onclick="if(event.target===this)closeManage()">
                <div class="modal-box">
                    <div class="modal-title">管理分类</div>
                    <div style="display:flex;gap:8px;margin-bottom:12px;">
                        <input type="text" id="newCatName" placeholder="新分类名称" style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:var(--bg);outline:none;">
                        <button class="btn primary" onclick="addCategory()" style="flex:none;padding:10px 16px;border-radius:10px;">添加</button>
                    </div>
                    <div style="max-height:280px;overflow-y:auto;">
                        ${categories.map(c => `
                            <div style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
                                <span style="flex:1;font-size:14px;color:var(--text);">${c.name}</span>
                                <button onclick="removeCategory(${c.id})" style="width:26px;height:26px;border-radius:50%;border:none;background:var(--danger);color:#fff;cursor:pointer;font-size:14px;">✕</button>
                            </div>
                        `).join('')}
                        ${categories.length === 0 ? '<div class="empty">暂无分类</div>' : ''}
                    </div>
                    <div class="modal-actions">
                        <button class="btn" onclick="closeManage()">关闭</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', html);
        }

        function closeManage() {
            const m = document.getElementById('manageModal');
            if (m) m.remove();
        }

        async function addCategory() {
            const input = document.getElementById('newCatName');
            const name = input.value.trim();
            if (!name) return;
            try {
                await apiPost('/api/categories', { name });
                await loadAll();
                showToast('分类已添加');
                renderSidebar();
                initCategorySelect();
                input.value = '';
                closeManage();
                openManage(); // 刷新分类管理弹窗
            } catch (e) {
                showToast('添加失败: ' + e.message);
            }
        }

        async function removeCategory(id) {
            const cat = categories.find(c => c.id === id);
            showConfirm(`确定删除分类"${cat ? cat.name : ''}"？\n该分类下的所有菜品也会被删除。`, async () => {
                try {
                    await apiDelete(`/api/categories/${id}`);
                    await loadAll();
                    showToast('分类已删除');
                    if (currentCategoryId === id) currentCategoryId = categories[0]?.id || null;
                    renderSidebar();
                    renderContent();
                    closeManage();
                    openManage();
                } catch (e) {
                    showToast('删除失败: ' + e.message);
                }
            });
        }

        // ========== 购物车 & 下单 ==========
        function updateCart(id, delta) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += delta;
            if (cart[id] <= 0) delete cart[id];
            saveCart();
            updateCartBadge();
            renderContent();
        }

        function saveCart() {
            localStorage.setItem(STORAGE_CART, JSON.stringify(cart));
        }

        function updateCartBadge() {
            const total = Object.values(cart).reduce((a, b) => a + b, 0);
            const badge = document.getElementById('cartBadge');
            if (total > 0) {
                badge.style.display = 'flex';
                badge.textContent = total;
            } else {
                badge.style.display = 'none';
            }
        }

        async function removeToday(dishId) {
            try {
                await apiDelete(`/api/today/${dishId}`);
                await loadAll();
                renderContent();
                showToast('已移除');
            } catch (e) {
                showToast('移除失败: ' + e.message);
            }
        }

        function randomPick() {
            if (dishes.length === 0) return;
            const d = dishes[Math.floor(Math.random() * dishes.length)];
            updateCart(d.id, 1);
            showToast('随机选中：' + d.name);
        }

        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function openCart() {
            const items = document.getElementById('cartItems');
            const ids = Object.keys(cart);
            if (ids.length === 0) {
                items.innerHTML = '<div class="empty">购物车是空的</div>';
            } else {
                items.innerHTML = ids.map(id => {
                    const d = dishes.find(x => x.id === parseInt(id));
                    if (!d) return '';
                    return `<div class="cart-item">
                        <span class="cart-item-name">${escHtml(d.name)}</span>
                        <span class="cart-item-count">x${cart[id]}</span>
                        <button class="btn-minus" onclick="updateCart(${id},-1);openCart();">−</button>
                        <button class="btn-add" onclick="updateCart(${id},1);openCart();">+</button>
                    </div>`;
                }).join('');
            }
            openModal('cartModal');
        }

        async function confirmOrder() {
            const ids = Object.keys(cart).map(Number);
            if (ids.length === 0) { closeModal('cartModal'); return; }

            const btn = document.getElementById('btnConfirmOrder');
            btn.disabled = true;
            btn.textContent = '下单中...';

            try {
                const items = ids.map(id => ({
                    dish_id: id,
                    qty: cart[id] || 1,
                }));
                await apiPost('/api/orders', { items });

                cart = {};
                saveCart();
                updateCartBadge();
                closeModal('cartModal');
                await loadAll();
                renderContent();
                showToast('下单成功！');
            } catch (e) {
                showToast('下单失败: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '确定下单';
            }
        }

        // ========== Toast & Confirm ==========
        let toastTimer;
        function showConfirm(msg, onConfirm) {
            const old = document.getElementById('confirmModal');
            if (old) old.remove();
            const html = `
                <div class="modal show" id="confirmModal" onclick="if(event.target===this){document.getElementById('confirmModal').remove();}">
                    <div class="modal-box" style="max-width:280px;text-align:center;">
                        <div style="padding:16px 0;font-size:14px;color:var(--text);white-space:pre-line;line-height:1.6;">${msg}</div>
                        <div class="modal-actions" style="justify-content:center;gap:12px;">
                            <button class="btn" onclick="document.getElementById('confirmModal').remove();" style="padding:8px 24px;flex:none;">取消</button>
                            <button class="btn primary" id="confirmBtn" style="padding:8px 24px;flex:none;">确定</button>
                        </div>
                    </div>
                </div>`;
            document.body.insertAdjacentHTML('beforeend', html);
            document.getElementById('confirmBtn').onclick = () => {
                document.getElementById('confirmModal').remove();
                onConfirm();
            };
        }

        function showToast(msg) {
            const old = document.getElementById('toast');
            if (old) { old.remove(); clearTimeout(toastTimer); }
            const t = document.createElement('div');
            t.id = 'toast'; t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t);
            toastTimer = setTimeout(() => t.remove(), 2500);
        }

        // ========== 启动 ==========
        async function init() {
            // 首次使用提示设置 API 地址
            if (!localStorage.getItem('api_base')) {
                const url = prompt('请输入API地址（Cloudflare Workers 域名）：\n例如: https://sifangcai-api.xxx.workers.dev\n\n之后可在页面点击标题下方文字修改', '');
                if (url) {
                    localStorage.setItem('api_base', url.trim().replace(/\/+$/, ''));
                    location.reload();
                    return;
                }
            }

            document.getElementById('content').innerHTML = '<div class="empty"><span class="loading-spinner"></span>加载中...</div>';

            // 如果之前是管理员，尝试恢复
            if (adminToken) {
                isAdmin = true;
                showAdminUI();
            }

            await loadAll();
            if (categories.length === 0 && dishes.length === 0) {
                document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">📡</div>暂无数据<br><small style="color:var(--text-muted);">请确认API地址正确，或下拉刷新</small></div>';
            }
            renderSidebar();
            renderContent();
            updateCartBadge();
        }
        init();
    </script>
</body>
</html>
