<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>私房菜菜单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }
        .app { display: flex; flex-direction: column; height: 100vh; }

        .header {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            padding: 12px 16px;
            flex-shrink: 0;
        }
        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .title-area h1 { font-size: 18px; color: #333; }
        .title-area p { font-size: 12px; color: #666; margin-top: 2px; }
        .tabs {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }
        .tab {
            padding: 6px 0;
            font-size: 15px;
            color: #666;
            cursor: pointer;
            position: relative;
        }
        .tab.active { color: #333; font-weight: 600; }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: #4ecdc4;
            border-radius: 2px;
        }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 80px;
            background: #fff;
            overflow-y: auto;
            flex-shrink: 0;
            border-right: 1px solid #eee;
        }
        .category {
            padding: 16px 8px;
            text-align: center;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .category.active {
            background: #f5f5f5;
            color: #4ecdc4;
            border-left-color: #4ecdc4;
            font-weight: 600;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .dish-list { display: flex; flex-direction: column; gap: 12px; }
        .dish-card {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .dish-img {
            width: 80px; height: 80px;
            border-radius: 8px;
            object-fit: cover;
            background: #eee;
            flex-shrink: 0;
        }
        .dish-info { flex: 1; min-width: 0; }
        .dish-name { font-size: 15px; font-weight: 600; color: #333; }
        .dish-sales { font-size: 12px; color: #999; margin-top: 4px; }
        .dish-action {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-add {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #4ecdc4;
            color: #fff;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-minus {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 1px solid #ccc;
            background: #fff;
            color: #666;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .count { font-size: 14px; color: #333; min-width: 20px; text-align: center; }

        .footer {
            background: #fff;
            border-top: 1px solid #eee;
            padding: 8px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            flex-shrink: 0;
        }
        .cart-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cart-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: #4ecdc4;
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            position: relative;
            cursor: pointer;
        }
        .cart-badge {
            position: absolute;
            top: -4px; right: -4px;
            background: #ff6b6b;
            color: #fff;
            font-size: 11px;
            width: 18px; height: 18px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .cart-btns {
            flex: 1;
            display: flex;
            gap: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            border: 1px solid #4ecdc4;
            background: #fff;
            color: #4ecdc4;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }
        .btn.primary {
            background: #4ecdc4;
            color: #fff;
            border: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 360px;
        }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-actions .btn { padding: 10px; }

        .cart-modal .modal-box {
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin: 12px 0;
        }
        .cart-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .cart-item-name { flex: 1; font-size: 14px; }
        .cart-item-count { color: #999; font-size: 13px; margin-right: 12px; }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 999;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* 下单结果 */
        .order-result {
            background: #f0fdf9;
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            text-align: center;
        }
        .order-result .emoji { font-size: 40px; }
        .order-result .text { font-size: 14px; color: #333; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-top">
                <div class="avatar">🐰</div>
                <div class="title-area">
                    <h1>老大的私房菜单</h1>
                    <p>给糖小宝准备的菜单~</p>
                </div>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('menu')">私房菜</div>
                <div class="tab" onclick="switchTab('today')">今日安排</div>
            </div>
        </div>

        <div class="main">
            <div class="sidebar" id="sidebar"></div>
            <div class="content" id="content"></div>
        </div>

        <div class="footer">
            <div class="cart-bar">
                <div class="cart-icon" onclick="openCart()">
                    🛒
                    <span class="cart-badge" id="cartBadge" style="display:none">0</span>
                </div>
                <div class="cart-btns">
                    <button class="btn" onclick="randomPick()">随机选</button>
                    <button class="btn primary" onclick="openCart()">选好了</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 购物车弹窗 -->
    <div class="modal cart-modal" id="cartModal">
        <div class="modal-box">
            <div class="modal-title">已选菜品</div>
            <div class="cart-items" id="cartItems"></div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('cartModal')">继续选</button>
                <button class="btn primary" onclick="confirmOrder()">确定下单</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const GITHUB_OWNER = 'qzp0804';
        const GITHUB_REPO = 'diancai';
        const ORDERS_FILE = 'orders.json';
        let GITHUB_TOKEN = localStorage.getItem('github_token') || '';

        // ========== 数据 ==========
        let categories = [];
        let dishes = [];
        let todayList = [];
        let cart = {};
        let currentCategory = '';
        let currentTab = 'menu';

        // ========== 加载菜品数据 ==========
        async function loadData() {
            try {
                const resp = await fetch('data.json?t=' + Date.now());
                if (!resp.ok) throw new Error('加载失败');
                const data = await resp.json();
                categories = data.categories || [];
                dishes = data.dishes || [];
                if (categories.length > 0) currentCategory = categories[0];
            } catch (e) {
                console.error('加载失败:', e);
            }
            // 今日安排和购物车从本地加载
            todayList = JSON.parse(localStorage.getItem('today') || '[]');
            cart = JSON.parse(localStorage.getItem('cart') || '{}');
            // 清理不存在菜品的购物车
            Object.keys(cart).forEach(id => {
                if (!dishes.find(d => d.id === parseInt(id))) delete cart[id];
            });
            saveLocal();
        }

        function saveLocal() {
            localStorage.setItem('today', JSON.stringify(todayList));
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        // ========== 渲染 ==========
        function renderSidebar() {
            document.getElementById('sidebar').innerHTML = categories.map(c =>
                `<div class="category ${c === currentCategory ? 'active' : ''}" onclick="selectCategory('${c}')">${c}</div>`
            ).join('');
        }

        function renderContent() {
            const content = document.getElementById('content');
            if (currentTab === 'today') return renderToday(content);

            const filtered = dishes.filter(d => d.category === currentCategory);
            if (filtered.length === 0) {
                content.innerHTML = '<div class="empty">该分类暂无菜品~</div>';
                return;
            }
            content.innerHTML = `<div class="dish-list">${filtered.map(d => `
                <div class="dish-card">
                    <img class="dish-img" src="${d.image || 'https://placehold.co/80x80/eee/ccc?text=' + encodeURIComponent(d.name.slice(0,2))}" alt="${d.name}" onerror="this.src='https://placehold.co/80x80/eee/ccc?text=菜'">
                    <div class="dish-info">
                        <div class="dish-name">${d.name}</div>
                        <div class="dish-sales">已点 ${d.sales || 0} 次</div>
                    </div>
                    <div class="dish-action">
                        ${cart[d.id] ? `<button class="btn-minus" onclick="updateCart(${d.id},-1)">−</button><span class="count">${cart[d.id]}</span>` : ''}
                        <button class="btn-add" onclick="updateCart(${d.id},1)">+</button>
                    </div>
                </div>
            `).join('')}</div>`;
        }

        function renderToday(content) {
            if (todayList.length === 0) {
                content.innerHTML = '<div class="empty">今天还没点菜哦~</div>';
                return;
            }
            content.innerHTML = `<div class="dish-list">${todayList.map(id => {
                const d = dishes.find(x => x.id === id);
                if (!d) return '';
                return `<div class="dish-card">
                    <img class="dish-img" src="${d.image || 'https://placehold.co/80x80/eee/ccc?text=' + encodeURIComponent(d.name.slice(0,2))}" alt="${d.name}" onerror="this.src='https://placehold.co/80x80/eee/ccc?text=菜'">
                    <div class="dish-info">
                        <div class="dish-name">${d.name}</div>
                        <div class="dish-sales">${d.category}</div>
                    </div>
                    <button class="btn-del" onclick="removeToday(${id})" style="width:24px;height:24px;border-radius:50%;border:none;background:#ff6b6b;color:#fff;font-size:14px;cursor:pointer;">✕</button>
                </div>`;
            }).join('')}</div>`;
        }

        function selectCategory(cat) {
            currentCategory = cat;
            renderSidebar();
            renderContent();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((el, i) => {
                el.classList.toggle('active', (tab === 'menu' && i === 0) || (tab === 'today' && i === 1));
            });
            renderContent();
        }

        // ========== 购物车 ==========
        function updateCart(id, delta) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += delta;
            if (cart[id] <= 0) delete cart[id];
            saveLocal();
            updateCartBadge();
            renderContent();
        }

        function updateCartBadge() {
            const total = Object.values(cart).reduce((a, b) => a + b, 0);
            const badge = document.getElementById('cartBadge');
            if (total > 0) {
                badge.style.display = 'flex';
                badge.textContent = total;
            } else {
                badge.style.display = 'none';
            }
        }

        function removeToday(id) {
            todayList = todayList.filter(t => t !== id);
            saveLocal();
            renderContent();
        }

        function randomPick() {
            if (dishes.length === 0) return;
            const d = dishes[Math.floor(Math.random() * dishes.length)];
            updateCart(d.id, 1);
            showToast('随机选中：' + d.name);
        }

        // ========== 弹窗 ==========
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function openCart() {
            const items = document.getElementById('cartItems');
            const ids = Object.keys(cart);
            if (ids.length === 0) {
                items.innerHTML = '<div class="empty">购物车是空的</div>';
            } else {
                items.innerHTML = ids.map(id => {
                    const d = dishes.find(x => x.id === parseInt(id));
                    if (!d) return '';
                    return `<div class="cart-item">
                        <span class="cart-item-name">${d.name}</span>
                        <span class="cart-item-count">x${cart[id]}</span>
                        <button class="btn-minus" onclick="updateCart(${id},-1);openCart();">−</button>
                        <button class="btn-add" onclick="updateCart(${id},1);openCart();">+</button>
                    </div>`;
                }).join('');
            }
            openModal('cartModal');
        }

        // ========== 下单 ==========
        async function confirmOrder() {
            const ids = Object.keys(cart).map(Number);
            if (ids.length === 0) { closeModal('cartModal'); return; }

            // 记录今日安排
            todayList = [...new Set([...todayList, ...ids])];

            // 构建订单
            const now = new Date();
            const order = {
                time: now.toLocaleString('zh-CN'),
                timestamp: now.toISOString(),
                items: ids.map(id => {
                    const d = dishes.find(x => x.id === id);
                    return { name: d ? d.name : '未知', qty: cart[id] || 1 };
                })
            };

            // 保存到本地
            saveLocal();
            cart = {};
            updateCartBadge();
            closeModal('cartModal');
            renderContent();

            // 尝试上传订单
            const ok = await saveOrder(order);
            if (ok) {
                showToast('下单成功！老大已收到~');
            } else {
                // 存本地订单记录
                const localOrders = JSON.parse(localStorage.getItem('pending_orders') || '[]');
                localOrders.push(order);
                localStorage.setItem('pending_orders', JSON.stringify(localOrders));
                showToast('下单成功（本地保存）');
            }
        }

        // ========== 保存订单到 GitHub ==========
        async function saveOrder(order) {
            if (!GITHUB_TOKEN) {
                // 尝试设置
                const token = prompt(
                    '首次使用需设置 Token（只需一次）：\n\n' +
                    'Token 已通过微信发给你，粘贴即可\n\n' +
                    '💡 建议用 Chrome/Safari 打开'
                );
                if (token) {
                    GITHUB_TOKEN = token.trim();
                    localStorage.setItem('github_token', GITHUB_TOKEN);
                } else {
                    return false;
                }
            }

            try {
                const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${ORDERS_FILE}`;

                // 获取现有订单
                let orders = [];
                let sha = null;
                const getResp = await fetch(url, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                if (getResp.ok) {
                    const file = await getResp.json();
                    sha = file.sha;
                    const jsonStr = decodeURIComponent(escape(atob(file.content)));
                    orders = JSON.parse(jsonStr);
                }

                // 追加新订单
                orders.push(order);

                // 保存
                const jsonStr = JSON.stringify(orders, null, 2);
                const contentBase64 = btoa(unescape(encodeURIComponent(jsonStr)));
                const body = { message: '新订单', content: contentBase64 };
                if (sha) body.sha = sha;

                const putResp = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                if (!putResp.ok) {
                    if (putResp.status === 401 || putResp.status === 403) {
                        localStorage.removeItem('github_token');
                        GITHUB_TOKEN = '';
                    }
                    return false;
                }
                return true;
            } catch (e) {
                console.error('上传订单失败:', e);
                return false;
            }
        }

        // ========== Toast ==========
        let toastTimer;
        function showToast(msg) {
            const old = document.getElementById('toast');
            if (old) { old.remove(); clearTimeout(toastTimer); }
            const t = document.createElement('div');
            t.id = 'toast';
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            toastTimer = setTimeout(() => t.remove(), 2500);
        }

        // ========== 启动 ==========
        async function init() {
            await loadData();
            renderSidebar();
            renderContent();
            updateCartBadge();
        }
        init();
    </script>
</body>
</html>
