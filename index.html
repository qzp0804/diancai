<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>私房菜菜单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }
        .app { display: flex; flex-direction: column; height: 100vh; }

        .header {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            padding: 12px 16px;
            flex-shrink: 0;
        }
        .header-top {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .title-area { flex: 1; min-width: 140px; cursor: pointer; user-select: none; -webkit-user-select: none; }
        .title-area h1 { font-size: 18px; color: #333; word-break: keep-all; pointer-events: none; }
        .title-area p { font-size: 12px; color: #666; margin-top: 2px; }
        .admin-badge {
            display: none;
            background: #ff6b6b;
            color: #fff;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .admin-badge.show { display: inline-block; }
        .header-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-sm {
            padding: 4px 12px;
            border-radius: 14px;
            border: 1px solid #4ecdc4;
            background: #fff;
            color: #4ecdc4;
            font-size: 12px;
            cursor: pointer;
            display: none;
        }
        .btn-sm.primary {
            background: #4ecdc4;
            color: #fff;
            border: none;
        }
        .btn-sm.show { display: inline-block; }
        .tabs {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }
        .tab {
            padding: 6px 0;
            font-size: 15px;
            color: #666;
            cursor: pointer;
            position: relative;
        }
        .tab.active { color: #333; font-weight: 600; }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: #4ecdc4;
            border-radius: 2px;
        }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 80px;
            background: #fff;
            overflow-y: auto;
            flex-shrink: 0;
            border-right: 1px solid #eee;
        }
        .category {
            padding: 16px 8px;
            text-align: center;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .category.active {
            background: #f5f5f5;
            color: #4ecdc4;
            border-left-color: #4ecdc4;
            font-weight: 600;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .dish-list { display: flex; flex-direction: column; gap: 12px; }
        .dish-card {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .dish-img {
            width: 80px; height: 80px;
            border-radius: 8px;
            object-fit: cover;
            background: #eee;
            flex-shrink: 0;
        }
        .dish-info { flex: 1; min-width: 0; }
        .dish-name { font-size: 15px; font-weight: 600; color: #333; }
        .dish-sales { font-size: 12px; color: #999; margin-top: 4px; }
        .dish-action {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-add {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #4ecdc4;
            color: #fff;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-minus {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 1px solid #ccc;
            background: #fff;
            color: #666;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .count { font-size: 14px; color: #333; min-width: 20px; text-align: center; }
        .admin-btn {
            display: none;
            width: 22px; height: 22px;
            border-radius: 50%;
            border: none;
            font-size: 12px;
            cursor: pointer;
        }
        .admin-btn.show { display: flex; align-items: center; justify-content: center; }
        .btn-edit { background: #e8f5e9; color: #4caf50; }
        .btn-del { background: #ffebee; color: #f44336; }

        .footer {
            background: #fff;
            border-top: 1px solid #eee;
            padding: 8px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            flex-shrink: 0;
        }
        .cart-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cart-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: #4ecdc4;
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            position: relative;
            cursor: pointer;
        }
        .cart-badge {
            position: absolute;
            top: -4px; right: -4px;
            background: #ff6b6b;
            color: #fff;
            font-size: 11px;
            width: 18px; height: 18px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .cart-btns {
            flex: 1;
            display: flex;
            gap: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            border: 1px solid #4ecdc4;
            background: #fff;
            color: #4ecdc4;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }
        .btn.primary {
            background: #4ecdc4;
            color: #fff;
            border: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 360px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-actions .btn { padding: 10px; }

        .cart-modal .modal-box {
            display: flex;
            flex-direction: column;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin: 12px 0;
        }
        .cart-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .cart-item-name { flex: 1; font-size: 14px; }
        .cart-item-count { color: #999; font-size: 13px; margin-right: 12px; }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }
        .btn-upload {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px dashed #4ecdc4;
            background: #f0fdf9;
            color: #4ecdc4;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-upload input { display: none; }
        .image-preview {
            width: 80px; height: 80px;
            border-radius: 8px;
            object-fit: cover;
            background: #eee;
            margin: 8px 0;
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 999;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* 导出提示 */
        .export-tip {
            display: none;
            background: #fffbe6;
            border: 1px solid #ffe58f;
            padding: 8px 16px;
            font-size: 12px;
            color: #ad6800;
            text-align: center;
            cursor: pointer;
        }
        .export-tip.show { display: block; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="export-tip" id="exportTip" onclick="exportData()">
                ⚠️ 有未同步的修改，点击此处导出数据文件
            </div>
            <div class="header-top">
                <div class="avatar">🐰</div>
                <div class="title-area" onclick="onTitleClick()">
                    <h1>老大的私房菜单<span class="admin-badge" id="adminBadge">管理</span></h1>
                    <p>给糖小宝准备的菜单~</p>
                </div>
                <div class="header-actions">
                    <button class="btn-sm" id="btnExport" onclick="exportData()">导出数据</button>
                    <button class="btn-sm" id="btnManage" onclick="openManage()">分类</button>
                    <button class="btn-sm primary" id="btnAdd" onclick="openAdd()">添加菜品</button>
                    <button class="btn-sm" id="btnExit" onclick="exitAdmin()" style="border-color:#ff6b6b;color:#ff6b6b;">退出</button>
                </div>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('menu')">私房菜</div>
                <div class="tab" onclick="switchTab('today')">今日安排</div>
            </div>
        </div>

        <div class="main">
            <div class="sidebar" id="sidebar"></div>
            <div class="content" id="content"></div>
        </div>

        <div class="footer">
            <div class="cart-bar">
                <div class="cart-icon" onclick="openCart()">
                    🛒
                    <span class="cart-badge" id="cartBadge" style="display:none">0</span>
                </div>
                <div class="cart-btns">
                    <button class="btn" onclick="randomPick()">随机选</button>
                    <button class="btn primary" onclick="openCart()">选好了</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑菜品弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-box">
            <div class="modal-title" id="addModalTitle">添加菜品</div>
            <div class="form-group">
                <label>菜品名称</label>
                <input type="text" id="dishName" placeholder="例如：红烧排骨">
            </div>
            <div class="form-group">
                <label>分类</label>
                <select id="dishCategory"></select>
            </div>
            <div class="form-group">
                <label>图片</label>
                <label class="btn-upload">📷 选择图片<input type="file" id="dishImageFile" accept="image/*" onchange="previewImage(this)"></label>
                <img class="image-preview" id="imagePreview" src="">
                <input type="text" id="dishImage" placeholder="或填写图片URL" style="margin-top:8px;">
                <small style="color:#999;">图片会转为base64存储在本地，刷新不丢失</small>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('addModal')">取消</button>
                <button class="btn primary" onclick="saveDish()">保存</button>
            </div>
        </div>
    </div>

    <!-- 购物车弹窗 -->
    <div class="modal cart-modal" id="cartModal">
        <div class="modal-box">
            <div class="modal-title">已选菜品</div>
            <div class="cart-items" id="cartItems"></div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('cartModal')">继续选</button>
                <button class="btn primary" onclick="confirmOrder()">确定下单</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const GITHUB_OWNER = 'qzp0804';
        const GITHUB_REPO = 'diancai';
        const DATA_FILE = 'data.json';
        const ORDERS_FILE = 'orders.json';
        const ADMIN_PASSWORD = 'laoda520';
        const STORAGE_KEY = 'app_data'; // localStorage 主键
        let GITHUB_TOKEN = localStorage.getItem('github_token') || '';

        // ========== 状态 ==========
        let categories = [];
        let dishes = [];
        let todayList = [];
        let cart = {};
        let currentCategory = '';
        let currentTab = 'menu';
        let isAdmin = false;
        let editingDishId = null;
        let titleClickCount = 0;
        let titleClickTimer = null;
        let dataDirty = false; // 标记是否有未同步的修改

        // ========== 管理员入口 ==========
        function onTitleClick() {
            titleClickCount++;
            if (titleClickCount >= 5) {
                titleClickCount = 0;
                if (!isAdmin) enterAdmin();
                else exitAdmin();
            }
            clearTimeout(titleClickTimer);
            titleClickTimer = setTimeout(() => { titleClickCount = 0; }, 2000);
        }

        function enterAdmin() {
            const pw = prompt('请输入管理密码：');
            if (pw !== ADMIN_PASSWORD) { showToast('密码错误'); return; }
            isAdmin = true;
            document.getElementById('adminBadge').classList.add('show');
            document.getElementById('btnManage').classList.add('show');
            document.getElementById('btnAdd').classList.add('show');
            document.getElementById('btnExport').classList.add('show');
            document.getElementById('btnExit').classList.add('show');
            showToast('已进入管理模式（连点标题5次可退出）');
            renderContent();
        }

        function exitAdmin() {
            isAdmin = false;
            document.getElementById('adminBadge').classList.remove('show');
            document.getElementById('btnManage').classList.remove('show');
            document.getElementById('btnAdd').classList.remove('show');
            document.getElementById('btnExport').classList.remove('show');
            document.getElementById('btnExit').classList.remove('show');
            if (dataDirty) {
                document.getElementById('exportTip').classList.add('show');
            }
            showToast('已退出管理模式');
            renderContent();
        }

        // ========== 数据持久化 ==========
        function saveAll() {
            const data = { categories, dishes, today: todayList };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            dataDirty = true;
            if (isAdmin) {
                document.getElementById('exportTip').classList.add('show');
            }
        }

        async function loadAll() {
            // 1. 先从 data.json 加载菜品和分类
            await loadFromJson();

            // 2. 如果 data.json 加载失败，尝试从 localStorage 加载
            if (categories.length === 0 && dishes.length === 0) {
                const local = localStorage.getItem(STORAGE_KEY);
                if (local) {
                    try {
                        const data = JSON.parse(local);
                        categories = data.categories || [];
                        dishes = data.dishes || [];
                        if (categories.length > 0) currentCategory = categories[0];
                    } catch (e) { /* ignore */ }
                }
            }

            // 3. todayList 优先从 localStorage 恢复（因为 data.json 的 today 始终为空）
            const savedToday = localStorage.getItem('today_list');
            if (savedToday) {
                try { todayList = JSON.parse(savedToday); } catch (e) {}
            }
            // 如果 local 也没有，尝试从 orders.json 加载
            if (todayList.length === 0) {
                await loadTodayFromOrders();
            }

            // 4. 购物车从独立 key 加载
            cart = JSON.parse(localStorage.getItem('cart') || '{}');
            Object.keys(cart).forEach(id => {
                if (!dishes.find(d => d.id === parseInt(id))) delete cart[id];
            });
            localStorage.setItem('cart', JSON.stringify(cart));

            if (categories.length > 0 && !currentCategory) currentCategory = categories[0];
        }

        async function loadTodayFromOrders() {
            try {
                const resp = await fetch('orders.json?t=' + Date.now());
                if (!resp.ok) return;
                const orders = await resp.json();
                // 从最近的订单中提取 todayList
                const ids = new Set();
                orders.forEach(o => {
                    (o.items || []).forEach(item => {
                        const d = dishes.find(x => x.name === item.name);
                        if (d) ids.add(d.id);
                    });
                });
                if (ids.size > 0) {
                    todayList = [...ids];
                    localStorage.setItem('today_list', JSON.stringify(todayList));
                }
            } catch (e) { /* ignore */ }
        }

        async function loadFromJson() {
            try {
                const resp = await fetch('data.json?t=' + Date.now());
                if (!resp.ok) return;
                const data = await resp.json();
                categories = data.categories || [];
                dishes = data.dishes || [];
                todayList = data.today || [];
                if (categories.length > 0) currentCategory = categories[0];
                // 缓存到 localStorage
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                dataDirty = false;
                document.getElementById('exportTip').classList.remove('show');
            } catch (e) {
                console.error('加载 data.json 失败:', e);
            }
        }

        // ========== 导出数据（下载 data.json 文件）==========
        function exportData() {
            const data = { categories, dishes, today: todayList };
            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'data.json';
            a.click();
            URL.revokeObjectURL(url);
            dataDirty = false;
            document.getElementById('exportTip').classList.remove('show');
            showToast('data.json 已下载，请替换本地文件后 git push');
        }

        // ========== 渲染 ==========
        function renderSidebar() {
            document.getElementById('sidebar').innerHTML = categories.map(c =>
                `<div class="category ${c === currentCategory ? 'active' : ''}" onclick="selectCategory('${c}')">${c}</div>`
            ).join('');
        }

        function renderContent() {
            const content = document.getElementById('content');
            if (currentTab === 'today') return renderToday(content);

            const filtered = dishes.filter(d => d.category === currentCategory);
            if (filtered.length === 0) {
                content.innerHTML = '<div class="empty">该分类暂无菜品~</div>';
                return;
            }
            content.innerHTML = `<div class="dish-list">${filtered.map(d => `
                <div class="dish-card">
                    <img class="dish-img" src="${d.image || 'https://placehold.co/80x80/eee/ccc?text=' + encodeURIComponent(d.name.slice(0,2))}" alt="${d.name}" onerror="this.src='https://placehold.co/80x80/eee/ccc?text=菜'">
                    <div class="dish-info">
                        <div class="dish-name">${d.name}</div>
                        <div class="dish-sales">已点 ${d.sales || 0} 次</div>
                    </div>
                    <div class="dish-action">
                        ${isAdmin ? `
                            <button class="admin-btn btn-edit show" onclick="openEdit(${d.id})" title="编辑">✎</button>
                            <button class="admin-btn btn-del show" onclick="deleteDish(${d.id})" title="删除">✕</button>
                        ` : ''}
                        ${cart[d.id] ? `<button class="btn-minus" onclick="updateCart(${d.id},-1)">−</button><span class="count">${cart[d.id]}</span>` : ''}
                        <button class="btn-add" onclick="updateCart(${d.id},1)">+</button>
                    </div>
                </div>
            `).join('')}</div>`;
        }

        function renderToday(content) {
            if (todayList.length === 0) {
                content.innerHTML = '<div class="empty">今天还没点菜哦~</div>';
                return;
            }
            content.innerHTML = `<div class="dish-list">${todayList.map(id => {
                const d = dishes.find(x => x.id === id);
                if (!d) return '';
                return `<div class="dish-card">
                    <img class="dish-img" src="${d.image || 'https://placehold.co/80x80/eee/ccc?text=' + encodeURIComponent(d.name.slice(0,2))}" alt="${d.name}" onerror="this.src='https://placehold.co/80x80/eee/ccc?text=菜'">
                    <div class="dish-info">
                        <div class="dish-name">${d.name}</div>
                        <div class="dish-sales">${d.category}</div>
                    </div>
                    <button class="admin-btn btn-del show" onclick="removeToday(${id})" style="width:24px;height:24px;">✕</button>
                </div>`;
            }).join('')}</div>`;
        }

        function selectCategory(cat) {
            currentCategory = cat;
            renderSidebar();
            renderContent();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((el, i) => {
                el.classList.toggle('active', (tab === 'menu' && i === 0) || (tab === 'today' && i === 1));
            });
            renderContent();
        }

        // ========== 菜品增删改（存 localStorage，刷新不丢）==========
        function openAdd() {
            if (!isAdmin) return;
            editingDishId = null;
            document.getElementById('addModalTitle').textContent = '添加菜品';
            document.getElementById('dishName').value = '';
            document.getElementById('dishImage').value = '';
            document.getElementById('dishImageFile').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            initCategorySelect();
            openModal('addModal');
        }

        function openEdit(id) {
            if (!isAdmin) return;
            const d = dishes.find(x => x.id === id);
            if (!d) return;
            editingDishId = id;
            document.getElementById('addModalTitle').textContent = '编辑菜品';
            document.getElementById('dishName').value = d.name;
            document.getElementById('dishImage').value = d.image || '';
            document.getElementById('dishImageFile').value = '';
            const preview = document.getElementById('imagePreview');
            if (d.image) {
                preview.src = d.image;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
            initCategorySelect();
            document.getElementById('dishCategory').value = d.category;
            openModal('addModal');
        }

        async function deleteDish(id) {
            if (!isAdmin) return;
            showConfirm('确定删除这个菜品吗？', () => {
                dishes = dishes.filter(d => d.id !== id);
                todayList = todayList.filter(t => t !== id);
                saveAll();
                showToast('删除成功！请记得导出 data.json 并 git push');
                renderContent();
            });
        }

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveDish() {
            if (!isAdmin) return;
            const nameEl = document.getElementById('dishName');
            const catEl = document.getElementById('dishCategory');
            const imgEl = document.getElementById('dishImage');
            const fileInput = document.getElementById('dishImageFile');

            if (!nameEl || !catEl) { showToast('表单加载异常，请关闭重试'); return; }

            const name = nameEl.value.trim();
            const category = catEl.value;
            const imageUrl = imgEl ? imgEl.value.trim() : '';

            if (!name) { showToast('请输入菜品名称'); return; }

            function doSave(finalImage) {
                if (editingDishId) {
                    const idx = dishes.findIndex(d => d.id === editingDishId);
                    if (idx >= 0) {
                        dishes[idx].name = name;
                        dishes[idx].category = category;
                        if (finalImage) dishes[idx].image = finalImage;
                    }
                } else {
                    dishes.push({
                        id: Date.now(),
                        name,
                        category,
                        image: finalImage || '',
                        sales: 0
                    });
                }
                saveAll();
                closeModal('addModal');
                editingDishId = null;
                currentCategory = category;
                renderSidebar();
                renderContent();
                showToast('保存成功！请记得导出 data.json 并 git push');
            }

            if (fileInput && fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = e => doSave(e.target.result);
                reader.onerror = () => doSave(imageUrl);
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                doSave(imageUrl);
            }
        }

        function initCategorySelect() {
            const select = document.getElementById('dishCategory');
            select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        // ========== 分类管理 ==========
        function openManage() {
            if (!isAdmin) return;
            const old = document.getElementById('manageModal');
            if (old) old.remove();

            const html = `
            <div class="modal show" id="manageModal" onclick="if(event.target===this)closeManage()">
                <div class="modal-box">
                    <div class="modal-title">管理分类</div>
                    <div style="display:flex;gap:8px;margin-bottom:12px;">
                        <input type="text" id="newCatName" placeholder="新分类名称" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;">
                        <button class="btn primary" onclick="addCategory()" style="flex:none;padding:10px 16px;border-radius:8px;">添加</button>
                    </div>
                    <div style="max-height:300px;overflow-y:auto;">
                        ${categories.map(c => `
                            <div style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;">
                                <span style="flex:1;font-size:14px;">${c}</span>
                                <button onclick="removeCategory('${c}')" style="width:22px;height:22px;border-radius:50%;border:none;background:#ff6b6b;color:#fff;cursor:pointer;">✕</button>
                            </div>
                        `).join('')}
                        ${categories.length === 0 ? '<div class="empty">暂无分类</div>' : ''}
                    </div>
                    <div class="modal-actions">
                        <button class="btn" onclick="closeManage()">关闭</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', html);
        }

        function closeManage() {
            const m = document.getElementById('manageModal');
            if (m) m.remove();
        }

        function addCategory() {
            const input = document.getElementById('newCatName');
            const name = input.value.trim();
            if (!name) return;
            if (categories.includes(name)) { showToast('分类已存在'); return; }
            categories.push(name);
            saveAll();
            showToast('分类已添加');
            renderSidebar();
            initCategorySelect();
            input.value = '';
            closeManage();
            openManage();
        }

        function removeCategory(name) {
            showConfirm(`确定删除分类"${name}"？`, () => {
                categories = categories.filter(c => c !== name);
                saveAll();
                showToast('分类已删除');
                if (currentCategory === name) currentCategory = categories[0] || '';
                renderSidebar();
                renderContent();
                closeManage();
                openManage();
            });
        }

        // ========== 购物车 & 下单 ==========
        function updateCart(id, delta) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += delta;
            if (cart[id] <= 0) delete cart[id];
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            renderContent();
        }

        function updateCartBadge() {
            const total = Object.values(cart).reduce((a, b) => a + b, 0);
            const badge = document.getElementById('cartBadge');
            if (total > 0) {
                badge.style.display = 'flex';
                badge.textContent = total;
            } else {
                badge.style.display = 'none';
            }
        }

        function removeToday(id) {
            todayList = todayList.filter(t => t !== id);
            localStorage.setItem('today_list', JSON.stringify(todayList));
            saveAll();
            renderContent();
        }

        function randomPick() {
            if (dishes.length === 0) return;
            const d = dishes[Math.floor(Math.random() * dishes.length)];
            updateCart(d.id, 1);
            showToast('随机选中：' + d.name);
        }

        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function openCart() {
            const items = document.getElementById('cartItems');
            const ids = Object.keys(cart);
            if (ids.length === 0) {
                items.innerHTML = '<div class="empty">购物车是空的</div>';
            } else {
                items.innerHTML = ids.map(id => {
                    const d = dishes.find(x => x.id === parseInt(id));
                    if (!d) return '';
                    return `<div class="cart-item">
                        <span class="cart-item-name">${d.name}</span>
                        <span class="cart-item-count">x${cart[id]}</span>
                        <button class="btn-minus" onclick="updateCart(${id},-1);openCart();">−</button>
                        <button class="btn-add" onclick="updateCart(${id},1);openCart();">+</button>
                    </div>`;
                }).join('');
            }
            openModal('cartModal');
        }

        async function confirmOrder() {
            const ids = Object.keys(cart).map(Number);
            if (ids.length === 0) { closeModal('cartModal'); return; }

            todayList = [...new Set([...todayList, ...ids])];
            localStorage.setItem('today_list', JSON.stringify(todayList));
            saveAll();

            const now = new Date();
            const order = {
                time: now.toLocaleString('zh-CN'),
                timestamp: now.toISOString(),
                items: ids.map(id => {
                    const d = dishes.find(x => x.id === id);
                    return { name: d ? d.name : '未知', qty: cart[id] || 1 };
                })
            };

            // 订单也存 localStorage
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));

            cart = {};
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            closeModal('cartModal');
            renderContent();

            // 尝试同步订单到 GitHub
            const ok = await saveOrderToGitHub(order);
            showToast(ok ? '下单成功！' : '下单成功（本地保存）');
        }

        async function saveOrderToGitHub(order) {
            if (!GITHUB_TOKEN) {
                const t = prompt('首次下单需设置 Token（微信已发你）：');
                if (t) {
                    GITHUB_TOKEN = t.trim();
                    localStorage.setItem('github_token', GITHUB_TOKEN);
                } else return false;
            }
            try {
                const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${ORDERS_FILE}`;
                let orders = [], sha = null;
                const getResp = await fetch(url, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                if (getResp.ok) {
                    const f = await getResp.json();
                    sha = f.sha;
                    orders = JSON.parse(decodeURIComponent(escape(atob(f.content))));
                }
                orders.push(order);
                const jsonStr = JSON.stringify(orders, null, 2);
                const b64 = btoa(unescape(encodeURIComponent(jsonStr)));
                const body = { message: '新订单', content: b64 };
                if (sha) body.sha = sha;
                const putResp = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!putResp.ok) {
                    if (putResp.status === 401 || putResp.status === 403) {
                        localStorage.removeItem('github_token'); GITHUB_TOKEN = '';
                    }
                    return false;
                }
                return true;
            } catch (e) { return false; }
        }

        // ========== Toast ==========
        let toastTimer;
        function showConfirm(msg, onConfirm) {
            const old = document.getElementById('confirmModal');
            if (old) old.remove();
            const html = `
                <div class="modal show" id="confirmModal" onclick="if(event.target===this){document.getElementById('confirmModal').remove();}">
                    <div class="modal-box" style="max-width:280px;text-align:center;">
                        <div style="padding:20px 0;font-size:15px;color:#333;">${msg}</div>
                        <div class="modal-actions" style="justify-content:center;gap:16px;">
                            <button class="btn" onclick="document.getElementById('confirmModal').remove();" style="padding:8px 24px;">取消</button>
                            <button class="btn primary" id="confirmBtn" style="padding:8px 24px;">确定</button>
                        </div>
                    </div>
                </div>`;
            document.body.insertAdjacentHTML('beforeend', html);
            document.getElementById('confirmBtn').onclick = () => {
                document.getElementById('confirmModal').remove();
                onConfirm();
            };
        }

        function showToast(msg) {
            const old = document.getElementById('toast');
            if (old) { old.remove(); clearTimeout(toastTimer); }
            const t = document.createElement('div');
            t.id = 'toast'; t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t);
            toastTimer = setTimeout(() => t.remove(), 3000);
        }

        // ========== 启动 ==========
        async function init() {
            await loadAll();
            if (categories.length === 0 && dishes.length === 0) {
                document.getElementById('content').innerHTML = '<div class="empty">加载失败，请下拉刷新页面重试</div>';
            }
            renderSidebar();
            renderContent();
            updateCartBadge();
        }
        init();
    </script>
</body>
</html>
