<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>私房菜菜单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }
        .app { display: flex; flex-direction: column; height: 100vh; }

        /* 顶部 */
        .header {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            padding: 12px 16px;
            flex-shrink: 0;
        }
        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .title-area h1 { font-size: 18px; color: #333; }
        .title-area p { font-size: 12px; color: #666; margin-top: 2px; }
        .tabs {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }
        .tab {
            padding: 6px 0;
            font-size: 15px;
            color: #666;
            cursor: pointer;
            position: relative;
        }
        .tab.active { color: #333; font-weight: 600; }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: #4ecdc4;
            border-radius: 2px;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
            align-items: center;
        }
        .btn-sm {
            padding: 4px 12px;
            border-radius: 14px;
            border: 1px solid #4ecdc4;
            background: #fff;
            color: #4ecdc4;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-sm.primary {
            background: #4ecdc4;
            color: #fff;
            border: none;
        }

        /* 主体 */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 80px;
            background: #fff;
            overflow-y: auto;
            flex-shrink: 0;
            border-right: 1px solid #eee;
        }
        .category {
            padding: 16px 8px;
            text-align: center;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .category.active {
            background: #f5f5f5;
            color: #4ecdc4;
            border-left-color: #4ecdc4;
            font-weight: 600;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .dish-list { display: flex; flex-direction: column; gap: 12px; }
        .dish-card {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .dish-img {
            width: 80px; height: 80px;
            border-radius: 8px;
            object-fit: cover;
            background: #eee;
            flex-shrink: 0;
        }
        .dish-info { flex: 1; min-width: 0; }
        .dish-name { font-size: 15px; font-weight: 600; color: #333; }
        .dish-sales { font-size: 12px; color: #999; margin-top: 4px; }
        .dish-action {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-add {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #4ecdc4;
            color: #fff;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-minus {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 1px solid #ccc;
            background: #fff;
            color: #666;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .count { font-size: 14px; color: #333; min-width: 20px; text-align: center; }

        /* 底部 */
        .footer {
            background: #fff;
            border-top: 1px solid #eee;
            padding: 8px 16px 12px;
            flex-shrink: 0;
        }
        .cart-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cart-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: #4ecdc4;
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            position: relative;
        }
        .cart-badge {
            position: absolute;
            top: -4px; right: -4px;
            background: #ff6b6b;
            color: #fff;
            font-size: 11px;
            width: 18px; height: 18px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .cart-btns {
            flex: 1;
            display: flex;
            gap: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            border: 1px solid #4ecdc4;
            background: #fff;
            color: #4ecdc4;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }
        .btn.primary {
            background: #4ecdc4;
            color: #fff;
            border: none;
        }

        /* 添加菜品弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 360px;
        }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-actions .btn { padding: 10px; }

        /* 购物车弹窗 */
        .cart-modal .modal-box {
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin: 12px 0;
        }
        .cart-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .cart-item-name { flex: 1; font-size: 14px; }
        .cart-item-count { color: #999; font-size: 13px; margin-right: 12px; }

        /* 空状态 */
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }
        .btn-del {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: none;
            background: #ff6b6b;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            margin-left: 8px;
        }
        .image-preview {
            width: 80px; height: 80px;
            border-radius: 8px;
            object-fit: cover;
            background: #eee;
            margin: 8px 0;
            display: none;
        }
        .btn-upload {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px dashed #4ecdc4;
            background: #f0fdf9;
            color: #4ecdc4;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
        }
        .btn-upload input { display: none; }
        .form-group small { color: #999; font-size: 11px; display: block; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-top">
                <div class="avatar">🐰</div>
                <div class="title-area">
                    <h1>老大的私房菜单</h1>
                    <p>给糖小宝准备的菜单~</p>
                </div>
                <div class="header-actions">
                    <button class="btn-sm" onclick="openManage()">管理</button>
                    <button class="btn-sm primary" onclick="openAdd()">添加菜品</button>
                </div>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('menu')">私房菜</div>
                <div class="tab" onclick="switchTab('today')">今日安排</div>
            </div>
        </div>

        <div class="main" id="mainArea">
            <div class="sidebar" id="sidebar"></div>
            <div class="content" id="content"></div>
        </div>

        <div class="footer">
            <div class="cart-bar">
                <div class="cart-icon" onclick="openCart()">
                    🛒
                    <span class="cart-badge" id="cartBadge" style="display:none">0</span>
                </div>
                <div class="cart-btns">
                    <button class="btn" onclick="randomPick()">随机选</button>
                    <button class="btn primary" onclick="openCart()">选好了</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加菜品弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-box">
            <div class="modal-title" id="addModalTitle">添加菜品</div>
            <div class="form-group">
                <label>菜品名称</label>
                <input type="text" id="dishName" placeholder="例如：红烧排骨">
            </div>
            <div class="form-group">
                <label>分类</label>
                <select id="dishCategory"></select>
            </div>
            <div class="form-group">
                <label>图片（可选）</label>
                <div style="display:flex;gap:10px;align-items:center;">
                    <label class="btn-upload">
                        📷 选择图片
                        <input type="file" id="dishImageFile" accept="image/*" onchange="previewImage(this)">
                    </label>
                    <small>或填URL</small>
                </div>
                <img class="image-preview" id="imagePreview" src="" alt="预览">
                <input type="text" id="dishImage" placeholder="https://... 或留空使用本地图片">
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('addModal')">取消</button>
                <button class="btn primary" onclick="saveDish()">保存</button>
            </div>
        </div>
    </div>

    <!-- 购物车弹窗 -->
    <div class="modal cart-modal" id="cartModal">
        <div class="modal-box">
            <div class="modal-title">已选菜品</div>
            <div class="cart-items" id="cartItems"></div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('cartModal')">继续选</button>
                <button class="btn primary" onclick="confirmOrder()">确定</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        // ⚠️ 部署前需要设置 GitHub Token（在 GitHub Settings → Developer settings → Personal access tokens → Tokens (classic)）
        // 权限勾选 repo（或者只勾选 public_repo，如果仓库是公开的）
        const GITHUB_OWNER = 'qzp0804';
        const GITHUB_REPO = 'diancai';
        const DATA_FILE = 'data.json';
        let GITHUB_TOKEN = localStorage.getItem('github_token') || '';

        // 如果没设置 token，提示设置
        function ensureToken() {
            if (!GITHUB_TOKEN) {
                const token = prompt('请设置 GitHub Personal Access Token：\n\n（在 GitHub Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate new token (classic)）\n勾选 repo 权限即可\n\nToken 会保存在你的浏览器本地存储中');
                if (token) {
                    GITHUB_TOKEN = token.trim();
                    localStorage.setItem('github_token', GITHUB_TOKEN);
                }
            }
            return !!GITHUB_TOKEN;
        }

        // ========== GitHub API 读写 ==========
        async function loadFromGitHub() {
            try {
                const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${DATA_FILE}`;
                const resp = await fetch(url, {
                    headers: GITHUB_TOKEN ? { 'Authorization': `token ${GITHUB_TOKEN}` } : {}
                });
                if (!resp.ok) throw new Error('加载失败');
                const data = await resp.json();
                const content = JSON.parse(atob(data.content));
                return { data, sha: data.sha, content };
            } catch (e) {
                console.error('从 GitHub 加载数据失败:', e);
                return null;
            }
        }

        async function saveToGitHub(content) {
            if (!ensureToken()) {
                alert('需要设置 GitHub Token 才能保存数据！');
                return false;
            }
            try {
                // 先获取当前文件 sha
                const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${DATA_FILE}`;
                const getResp = await fetch(url, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                if (!getResp.ok) throw new Error('获取文件信息失败');
                const fileInfo = await getResp.json();
                const sha = fileInfo.sha;

                // 更新文件
                const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
                const putResp = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: '更新菜品数据',
                        content: contentBase64,
                        sha: sha
                    })
                });
                if (!putResp.ok) {
                    const err = await putResp.json();
                    throw new Error(err.message || '保存失败');
                }
                return true;
            } catch (e) {
                console.error('保存到 GitHub 失败:', e);
                alert('保存失败：' + e.message);
                return false;
            }
        }

        // ========== 数据管理 ==========
        let categories = [];
        let dishes = [];
        let todayList = [];
        let cart = {};
        let currentCategory = '';
        let currentTab = 'menu';

        async function loadData() {
            // 先从 GitHub 加载
            const result = await loadFromGitHub();
            if (result && result.content) {
                categories = result.content.categories || [];
                dishes = result.content.dishes || [];
                todayList = result.content.today || [];
                if (categories.length > 0) currentCategory = categories[0];
                return;
            }
            // GitHub 加载失败，降级到 localStorage
            categories = JSON.parse(localStorage.getItem('categories') || 'null') || ['素炒', '炒菜', '炖菜'];
            dishes = JSON.parse(localStorage.getItem('dishes') || 'null') || [];
            todayList = JSON.parse(localStorage.getItem('today') || 'null') || [];
            if (categories.length > 0) currentCategory = categories[0];
        }

        async function persistData() {
            const data = { categories, dishes, today: todayList };
            const ok = await saveToGitHub(data);
            if (!ok) {
                // 降级到 localStorage
                localStorage.setItem('categories', JSON.stringify(categories));
                localStorage.setItem('dishes', JSON.stringify(dishes));
                localStorage.setItem('today', JSON.stringify(todayList));
                alert('⚠️ 保存到云端失败，已暂存到本地。请检查 Token 设置。');
            }
        }

        // 初始化
        async function init() {
            await loadData();
            renderSidebar();
            renderContent();
            updateCartBadge();
            initCategorySelect();
        }

        function initCategorySelect() {
            const select = document.getElementById('dishCategory');
            select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        // 渲染侧边栏
        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = categories.map(c => `
                <div class="category ${c === currentCategory ? 'active' : ''}" onclick="selectCategory('${c}')">${c}</div>
            `).join('');
        }

        // 渲染内容
        function renderContent() {
            const content = document.getElementById('content');
            if (currentTab === 'today') {
                renderToday(content);
                return;
            }
            const filtered = dishes.filter(d => d.category === currentCategory);
            if (filtered.length === 0) {
                content.innerHTML = '<div class="empty">该分类暂无菜品</div>';
                return;
            }
            content.innerHTML = `<div class="dish-list">${filtered.map(dish => `
                <div class="dish-card">
                    <img class="dish-img" src="${dish.image || `https://placehold.co/80x80/eee/ccc?text=${encodeURIComponent(dish.name.slice(0,2))}`}" alt="${dish.name}" onerror="this.src='https://placehold.co/80x80/eee/ccc?text=菜'">
                    <div class="dish-info">
                        <div class="dish-name">${dish.name}</div>
                        <div class="dish-sales">销量 ${dish.sales}</div>
                    </div>
                    <div class="dish-action">
                        <button class="btn-sm" onclick="openEdit(${dish.id})" style="padding:2px 6px;font-size:11px;margin-right:4px;">✎</button>
                        <button class="btn-del" onclick="deleteDish(${dish.id})" style="width:22px;height:22px;font-size:12px;margin-right:6px;">✕</button>
                        ${cart[dish.id] ? `
                            <button class="btn-minus" onclick="updateCart(${dish.id}, -1)">−</button>
                            <span class="count">${cart[dish.id]}</span>
                        ` : ''}
                        <button class="btn-add" onclick="updateCart(${dish.id}, 1)">+</button>
                    </div>
                </div>
            `).join('')}</div>`;
        }

        // 渲染今日安排
        function renderToday(content) {
            if (todayList.length === 0) {
                content.innerHTML = '<div class="empty">今日还没有安排菜品哦~</div>';
                return;
            }
            content.innerHTML = `<div class="dish-list">${todayList.map(id => {
                const dish = dishes.find(d => d.id === id);
                if (!dish) return '';
                return `
                <div class="dish-card">
                    <img class="dish-img" src="${dish.image || `https://placehold.co/80x80/eee/ccc?text=${encodeURIComponent(dish.name.slice(0,2))}`}" alt="${dish.name}" onerror="this.src='https://placehold.co/80x80/eee/ccc?text=菜'">
                    <div class="dish-info">
                        <div class="dish-name">${dish.name}</div>
                        <div class="dish-sales">${dish.category}</div>
                    </div>
                    <button class="btn-del" onclick="removeFromToday(${id})" title="从今日安排中移除">✕</button>
                </div>
                `;
            }).join('')}</div>`;
        }

        // 从今日安排中移除
        async function removeFromToday(id) {
            todayList = todayList.filter(t => t !== id);
            await persistData();
            renderContent();
        }

        // 选择分类
        function selectCategory(cat) {
            currentCategory = cat;
            renderSidebar();
            renderContent();
        }

        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((el, i) => {
                el.classList.toggle('active', (tab === 'menu' && i === 0) || (tab === 'today' && i === 1));
            });
            renderContent();
        }

        // 购物车操作
        function updateCart(id, delta) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += delta;
            if (cart[id] <= 0) delete cart[id];
            updateCartBadge();
            renderContent();
        }

        function updateCartBadge() {
            const total = Object.values(cart).reduce((a, b) => a + b, 0);
            const badge = document.getElementById('cartBadge');
            if (total > 0) {
                badge.style.display = 'flex';
                badge.textContent = total;
            } else {
                badge.style.display = 'none';
            }
        }

        // 弹窗控制
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        function openAdd() {
            editingDishId = null;
            document.getElementById('addModalTitle').textContent = '添加菜品';
            document.getElementById('dishName').value = '';
            document.getElementById('dishImage').value = '';
            document.getElementById('dishImageFile').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            openModal('addModal');
        }
        let editingDishId = null;

        // 打开编辑弹窗
        function openEdit(id) {
            const dish = dishes.find(d => d.id === id);
            if (!dish) return;
            editingDishId = id;
            document.getElementById('addModalTitle').textContent = '编辑菜品';
            document.getElementById('dishName').value = dish.name;
            document.getElementById('dishCategory').value = dish.category;
            document.getElementById('dishImage').value = dish.image || '';
            document.getElementById('dishImageFile').value = '';
            const preview = document.getElementById('imagePreview');
            if (dish.image) {
                preview.src = dish.image;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
            openModal('addModal');
        }

        // 删除菜品
        async function deleteDish(id) {
            if (!confirm('确定删除这个菜品吗？')) return;
            dishes = dishes.filter(d => d.id !== id);
            todayList = todayList.filter(t => t !== id);
            await persistData();
            renderContent();
        }

        function openCart() {
            const items = document.getElementById('cartItems');
            const ids = Object.keys(cart);
            if (ids.length === 0) {
                items.innerHTML = '<div class="empty">购物车是空的</div>';
            } else {
                items.innerHTML = ids.map(id => {
                    const dish = dishes.find(d => d.id === parseInt(id));
                    return `
                        <div class="cart-item">
                            <span class="cart-item-name">${dish.name}</span>
                            <span class="cart-item-count">x${cart[id]}</span>
                            <button class="btn-minus" onclick="updateCart(${id}, -1); openCart();">−</button>
                            <button class="btn-add" onclick="updateCart(${id}, 1); openCart();">+</button>
                        </div>
                    `;
                }).join('');
            }
            openModal('cartModal');
        }

        // 图片预览
        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 保存菜品
        async function saveDish() {
            const name = document.getElementById('dishName').value.trim();
            const category = document.getElementById('dishCategory').value;
            const imageUrl = document.getElementById('dishImage').value.trim();
            const fileInput = document.getElementById('dishImageFile');
            if (!name) { alert('请输入菜品名称'); return; }

            async function doSave(finalImage) {
                if (editingDishId) {
                    const idx = dishes.findIndex(d => d.id === editingDishId);
                    if (idx >= 0) {
                        dishes[idx].name = name;
                        dishes[idx].category = category;
                        if (finalImage) dishes[idx].image = finalImage;
                    }
                } else {
                    const newDish = {
                        id: Date.now(),
                        name,
                        category,
                        image: finalImage,
                        sales: 0
                    };
                    dishes.push(newDish);
                }
                await persistData();
                closeModal('addModal');
                editingDishId = null;
                currentCategory = category;
                renderSidebar();
                renderContent();
                document.getElementById('dishName').value = '';
                document.getElementById('dishImage').value = '';
                document.getElementById('dishImageFile').value = '';
                document.getElementById('imagePreview').style.display = 'none';
            }

            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { doSave(e.target.result); };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                doSave(imageUrl);
            }
        }

        // 随机选
        function randomPick() {
            if (dishes.length === 0) return;
            const random = dishes[Math.floor(Math.random() * dishes.length)];
            updateCart(random.id, 1);
            alert(`随机选中：${random.name}`);
        }

        // 确定下单
        async function confirmOrder() {
            const ids = Object.keys(cart).map(Number);
            if (ids.length === 0) { closeModal('cartModal'); return; }
            // 增加销量
            ids.forEach(id => {
                const dish = dishes.find(d => d.id === id);
                if (dish) dish.sales += cart[id] || 0;
            });
            // 保存今日安排
            const newToday = [...new Set([...todayList, ...ids])];
            todayList = newToday;
            await persistData();
            // 清空购物车
            cart = {};
            updateCartBadge();
            closeModal('cartModal');
            renderContent();
            alert('已加入今日安排！');
        }

        // 管理分类弹窗
        function openManage() {
            const existing = document.getElementById('manageModal');
            if (existing) existing.remove();

            const html = `
            <div class="modal show" id="manageModal" onclick="if(event.target===this)closeModal('manageModal')">
                <div class="modal-box">
                    <div class="modal-title">管理分类</div>
                    <div style="margin-bottom:12px;">
                        <div style="display:flex;gap:8px;">
                            <input type="text" id="newCategoryName" placeholder="输入新分类名称" style="flex:1;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
                            <button class="btn primary" onclick="addCategory()" style="flex:none;padding:10px 16px;border-radius:8px;">添加</button>
                        </div>
                    </div>
                    <div style="max-height:300px;overflow-y:auto;">
                        ${categories.map(c => `
                            <div style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;">
                                <span style="flex:1;font-size:14px;">${c}</span>
                                <button class="btn-del" onclick="removeCategory('${c}')" style="width:22px;height:22px;font-size:12px;">✕</button>
                            </div>
                        `).join('')}
                        ${categories.length === 0 ? '<div class="empty">暂无分类</div>' : ''}
                    </div>
                    <div class="modal-actions" style="margin-top:16px;">
                        <button class="btn" onclick="closeModal('manageModal')">关闭</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', html);
        }

        function addCategory() {
            const input = document.getElementById('newCategoryName');
            const name = input.value.trim();
            if (!name) return;
            if (categories.includes(name)) { alert('分类已存在'); return; }
            categories.push(name);
            persistData();
            renderSidebar();
            initCategorySelect();
            input.value = '';
            openManage();
        }

        function removeCategory(name) {
            if (!confirm(`确定删除分类"${name}"？该分类下的菜品不会被删除。`)) return;
            categories = categories.filter(c => c !== name);
            persistData();
            if (currentCategory === name) currentCategory = categories[0] || '';
            renderSidebar();
            renderContent();
            initCategorySelect();
            openManage();
        }

        // 启动
        init();
    </script>
</body>
</html>
